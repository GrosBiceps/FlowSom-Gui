mrd_parameters:
  blast_phenotype_filter:
    allowed_categories:
    - BLAST_HIGH
    - BLAST_MODERATE
    apply_to_eln: true
    apply_to_flo: true
    apply_to_jf: true
    d2_normalization: 45.0
    d2_threshold_high: 40.0
    d2_threshold_moderate: 25.0
    enabled: false
    high_threshold: 4.0
    linear_weight: 0.7
    mahal_boost_factor: 1.5
    mahal_weight: 0.3
    marker_weights:
      CD117: 2.5
      CD13: 1.0
      CD33: 1.5
      CD34: 3.0
      CD45: -1.0
      HLA-DR: 2.0
      SSC: -3.0
    moderate_threshold: 0.5
    nbm_cov_max_cells: 120000
    nbm_mincovdet_max_cells: 30000
    nbm_stats_max_cells: 250000
    purity_modulation_power: 0.5
    purity_relax_factor: 0.9
    purity_strict_above: 0.85
    purity_threshold_override: true
    scoring_method: hybrid
  condition_patho: Pathologique
  condition_sain: Sain
  eln_standards:
    clinical_positivity_pct: 0.1
    min_cluster_events: 50
  enabled: true
  method: all
  method_flo:
    normal_marrow_multiplier: 3.0
  method_jf:
    max_normal_marrow_pct: 10.0
    min_patho_cells_pct: 10.0
